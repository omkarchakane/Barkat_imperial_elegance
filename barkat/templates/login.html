{% extends 'base.html' %}
{% block content %}

<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh; margin-top: 80px;">
    <div class="card shadow-lg border-0 p-5" style="max-width: 400px; width: 100%;">
        <h3 class="text-center mb-4" style="font-family: 'Playfair Display', serif; color: var(--primary-color);">Welcome Back</h3>
        
        <form action="/login_check/" method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label text-muted">Email Address</label>
                <input type="email" name="email" class="form-control form-control-imperial" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-muted">Password</label>
                <input type="password" name="password" class="form-control form-control-imperial" required>
            </div>
            
            <button class="btn btn-add-cart w-100 py-2">Login</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="/register" class="text-muted text-decoration-none small">New here? Create an account</a>
        </div>
    </div>
</div>

{% endblock %}
