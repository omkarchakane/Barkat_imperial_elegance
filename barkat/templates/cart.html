<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

    {% include 'navbar.html' %}

<div class="container mt-4">

    <h2 class="mb-4">Shopping Cart</h2>
        <a href="/" class="btn btn-secondary mb-3">← Back</a>


    <table class="table table-bordered">
    <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total</th>
        <th>Action</th>
    </tr>

    {% for i in items %}
    <tr>
        <td>{{ i.product.name }}</td>
        <td>₹ {{ i.product.price }}</td>

        <td>
            <a href="/decrease/{{ i.id }}" class="btn btn-sm btn-secondary">-</a>
            {{ i.quantity }}
            <a href="/increase/{{ i.id }}" class="btn btn-sm btn-secondary">+</a>
        </td>

        <td>₹ {{ i.product.price }} × {{ i.quantity }}</td>

        <td>
            <a href="/remove_cart/{{ i.id }}" class="btn btn-sm btn-danger">
                Remove
            </a>
        </td>
    </tr>
    {% endfor %}
</table>


    <h4 class="text-end">Grand Total: ₹ {{ total }}</h4>

    <hr>

    <h5>Payment Options</h5>
    <select class="form-control w-50">
        <option>Cash on Delivery</option>
        <option>UPI</option>
        <option>PhonePe</option>
        <option>Google Pay</option>
    </select>

</div>

</body>
</html>
