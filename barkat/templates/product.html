<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

    {% include 'navbar.html' %}

<div class="container mt-4">

    <a href="/" class="btn btn-secondary mb-3">← Back</a>

    <div class="row">
        <div class="col-md-6">
            <img src="{{ product.image.url }}" class="img-fluid rounded">
        </div>

        <div class="col-md-6">
            <h2>{{ product.name }}</h2>
            <h4 class="text-success">₹ {{ product.price }}</h4>
            <p>{{ product.description }}</p>

            <a href="/add_cart/{{ product.id }}" class="btn btn-dark">
                Add to Cart
            </a>
        </div>
    </div>

    <hr>

    <h4>Customer Reviews</h4>

    {% for r in reviews %}
        <div class="border p-2 mb-2">
            <strong>{{ r.username }}</strong>
            <p>{{ r.comment }}</p>
        </div>
    {% empty %}
        <p>No reviews yet</p>
    {% endfor %}

    <hr>

    <h5>Add Review</h5>
    <form method="post">
        {% csrf_token %}
        <textarea name="comment" class="form-control mb-2"
          placeholder="Your review" required></textarea>

        <button class="btn btn-primary">Submit Review</button>
    </form>

</div>

</body>
</html>
