<!DOCTYPE html>
<html>
<head>
    <title>BARKAT Imperial Elegance</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
    
    {% include 'navbar.html' %}

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">BARKAT Imperial Elegance</span>
        </div>
    </nav>

    <div class="container mt-4">

        <!-- Search Bar -->
        <form method="get" class="mb-4">
            <input type="text" name="search" class="form-control"
                placeholder="Search saree...">
        </form>

        <div class="row">
            {% for p in products %}
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    <img src="{{ p.image.url }}" class="card-img-top" height="450">
                    <div class="card-body">
                        <h5 class="card-title">{{ p.name }}</h5>
                        <p class="card-text">₹ {{ p.price }}</p>
                        <a href="/product/{{ p.id }}" class="btn btn-dark w-100">
                            View Details
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

    </div>

</body>
</html>
