<!DOCTYPE html>
<html>
<head>
    <title>BARKAT Imperial Elegance</title>

  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
       
        .hero {
            position: relative;
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        .hero::before{
            content: "";
            position:absolute;
            top: 0;
            left: 0;
            width:100%;
            height:100%;
            background-image: url("/media/logo/barkatbg.png");
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            z-index: 1;
            
        }

        .hero{
            position: relative;
            z-index: 2;
            color: #1b3d2f;
        }

        .hero img {
            width: 420px;
            margin-bottom: 2px;
        }

        .hero p {
            font-size: 50px;
            margin-top: 5px;
            font-style: italic;
            color:#800000;
        }
    </style>      
</head>
<body>
    
    {% include 'navbar.html' %}

    

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
        </div>
    </nav>
    <div class="hero">
        <div class="hero-content">
            <img src="/media/logo/Barkat.png" alt="Barkat Logo">
            <p>Imperial Elegance in Every Saree</p>
        </div>
    </div>


    <div class="container mt-5">

        <!-- Search Bar -->
        <form method="get" class="mb-4">
            <input type="text" name="search" class="form-control"
                placeholder="Search saree...">
        </form>

        <div class="row">
            {% for p in products %}
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    <img src="{{ p.image.url }}" class="card-img-top" height="450">
                    <div class="card-body">
                        <h5 class="card-title">{{ p.name }}</h5>
                        <p class="card-text">₹ {{ p.price }}</p>
                        <a href="/product/{{ p.id }}" class="btn btn-dark w-100">
                            View Details
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

    </div>

</body>
</html>
